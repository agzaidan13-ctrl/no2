<!DOCTYPE html>
<html lang="ar" dir="rtl" data-bs-theme="light" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدخل الإحصائيات | معهد التدريب النفطي / بغداد</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    
    <style>
        :root { 
            --bg-body: #f0f9ff;          
            --bg-card: #ffffff;          
            --primary-blue: #0c4a6e;     
            --accent-blue: #38bdf8;      
            --text-dark: #073b52;
        }

        [data-bs-theme="dark"] {
            --bg-body: #082f49;          
            --bg-card: #0c4a6e;          
            --text-dark: #f0f9ff;
            --primary-blue: #38bdf8;     
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-dark); 
            transition: 0.3s; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        /* تنسيق الشعار الخلفي العملاق والشفاف (السر هنا) */
        body::after {
            content: "";
            background-image: url('https://raw.githubusercontent.com/agzaidan13-ctrl/no2/main/boti.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 80vh; /* حجم عملاق يعتمد على ارتفاع الشاشة */
            opacity: 0.04; /* شفافية شديدة جداً (4% فقط) */
            position: fixed; /* مثبت في الخلفية */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* لتوسيطه تماماً */
            width: 100%;
            height: 100%;
            z-index: -1; /* يقع خلف كافة العناصر */
            transition: 0.3s;
        }

        /* تحويل الشعار للون الأبيض الشفاف في الوضع الداكن ليكون جميلاً */
        [data-bs-theme="dark"] body::after {
            filter: invert(1); /* عكس الألوان للأبيض */
            opacity: 0.03; /* تقليل الشفافية قليلاً في الوضع الداكن */
        }

        /* تنسيق الشريط العلوي للبوابة */
        .portal-navbar {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(255,255,255,0.01); /* شفافية NAVBAR */
        }

        /* تنسيق قسم الترحيب */
        .hero-section {
            text-align: center;
            padding: 20px;
            margin-top: auto;
            margin-bottom: auto; /* لتوسيط المحتوى رأسياً */
        }
        
        .hero-logo { width: 100px; margin-bottom: 20px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        
        /* تنسيق أزرار السنوات الإحصائية */
        .year-btn-custom {
            display: block;
            background: var(--bg-card);
            border-radius: 50px; /* أزرار مستديرة (pill) */
            border: 2px solid var(--primary-blue);
            padding: 20px 40px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(12,74,110,0.05);
            text-decoration: none;
            color: var(--primary-blue);
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }
        
        .year-btn-custom:hover {
            background-color: var(--primary-blue);
            color: #fff;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(12, 74, 110, 0.2);
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
            font-size: 2.5rem;
            color: var(--primary-blue);
            transition: 0.3s;
        }

        .system-card:hover .icon-circle {
            background: var(--primary-blue);
            color: #fff;
            transform: scale(1.1);
        }

        .system-title { font-weight: bold; font-size: 1.25rem; margin-bottom: 10px; color: var(--primary-blue); }
        .system-desc { font-size: 0.9rem; opacity: 0.8; line-height: 1.6; margin-bottom: 0; }
        
        .footer-text { margin-top: auto; padding: 20px; text-align: center; font-size: 0.85rem; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="portal-navbar">
        <button class="btn btn-outline-secondary rounded-pill px-4" onclick="toggleDarkMode()" id="themeBtn">🌙 الوضع الداكن</button>
        <div class="fw-bold text-primary-blue">v 1.0</div>
    </div>

    <div class="container hero-section">
        
        <img src="images/boti.png" alt="شعار معهد التدريب النفطي" class="hero-logo" onerror="this.src='https://raw.githubusercontent.com/agzaidan13-ctrl/no2/main/boti.png'">
        
        <h1 class="fw-bold text-primary-blue mb-2">المنظومة الإحصائية الموحدة</h1>
        <h5 class="text-secondary mb-5">معهد التدريب النفطي / بغداد - قسم الإحصاء والتحول الرقمي</h5>
        <h4 class="fw-bold text-primary-blue mb-4">اختر العام التدريبي لعرض المؤشرات:</h4>

        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                
                <a href="dashboard_2025.html" class="year-btn-custom">📊 عام 2025</a>

                <a href="dashboard_2026.html" class="year-btn-custom">📊 عام 2026</a>

                </div>
        </div>
    </div>

    <div class="footer-text">
        &copy; 2026 جميع الحقوق محفوظة | برمجة وتصميم: م. علي غازي
    </div>

    <script>
        function toggleDarkMode() {
            const h = document.getElementById('mainHtml');
            const nm = h.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
            h.setAttribute('data-bs-theme', nm);
            document.getElementById('themeBtn').innerHTML = nm === 'dark' ? '🌙 الوضع الداكن' : '☀️ الوضع الفاتح';
        }
    </script>
</body>
</html>
