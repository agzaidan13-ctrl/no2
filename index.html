<!DOCTYPE html>
<html lang="ar" dir="rtl" data-bs-theme="light" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <title>إحصائيات معهد التدريب النفطي / بغداد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f0f9ff; }
        .dashboard-item { background: white; border-radius: 12px; padding: 15px; border: 1px solid #ddd; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container py-4">
    <h3 class="text-center mb-4">بيانات الموارد البشرية (اختبار)</h3>
    <div class="row">
        <div class="col-md-4"><div class="dashboard-item"><h6>أعداد المنتسبين</h6><div id="c1"></div></div></div>
        <div class="col-md-4"><div class="dashboard-item"><h6>المنتسبين حسب الأقسام</h6><div id="c2"></div></div></div>
        <div class="col-md-4"><div class="dashboard-item"><h6>الشهادات العليا</h6><div id="c3"></div></div></div>
    </div>
</div>

<script>
    const urls = {
        c1: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS20fiBfInxAzyeRRxCjo7BPeivzjPWX0RbUIoLQxOnnn3JcN3EVdKDIwOQETajC53LTKz39840MTIp/pub?gid=398430626&single=true&output=csv',
        c2: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS20fiBfInxAzyeRRxCjo7BPeivzjPWX0RbUIoLQxOnnn3JcN3EVdKDIwOQETajC53LTKz39840MTIp/pub?gid=255359164&single=true&output=csv',
        c3: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS20fiBfInxAzyeRRxCjo7BPeivzjPWX0RbUIoLQxOnnn3JcN3EVdKDIwOQETajC53LTKz39840MTIp/pub?gid=1489382222&single=true&output=csv'
    };

    function renderChart(id, data) {
        const labels = data.slice(1).map(r => r[0]);
        const series = [{ name: 'العدد', data: data.slice(1).map(r => parseFloat(r[1]) || 0) }];
        new ApexCharts(document.querySelector("#"+id), {
            chart: { type: 'bar', height: 250 },
            series: series,
            xaxis: { categories: labels }
        }).render();
    }

    Object.keys(urls).forEach(id => {
        fetch(urls[id] + '&nocache=' + Math.random())
        .then(res => res.text())
        .then(csv => {
            Papa.parse(csv, { complete: res => renderChart(id, res.data) });
        });
    });
</script>
</body>
</html>
